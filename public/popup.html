<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      padding: 14px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 16px; color: #e94560; }
    .header .subtitle { font-size: 11px; color: #888; }
    .stats {
      display: flex;
      gap: 1px;
      background: #0f3460;
    }
    .stat {
      flex: 1;
      background: #16213e;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      display: block;
    }
    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value.sleeping { color: #e94560; }
    .stat-value.awake { color: #4ecca3; }
    .stat-value.total { color: #e0e0e0; }
    #tab-list {
      max-height: 350px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .section-header {
      padding: 8px 16px 4px;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tab-row {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      gap: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .tab-row:hover { background: rgba(255,255,255,0.05); }
    .badge { font-size: 12px; flex-shrink: 0; }
    .tab-title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .tab-row.sleeping .tab-title { color: #999; }
    .tab-row.awake .tab-title { color: #e0e0e0; }
    .empty {
      padding: 24px 16px;
      text-align: center;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>∞ Infinity</h1>
    <span class="subtitle">Tab Sleep Manager</span>
  </div>
  <div class="stats">
    <div class="stat">
      <span class="stat-value total" id="total">-</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-value awake" id="awake">-</span>
      <span class="stat-label">Awake</span>
    </div>
    <div class="stat">
      <span class="stat-value sleeping" id="sleeping">-</span>
      <span class="stat-label">Sleeping</span>
    </div>
  </div>
  <div id="tab-list"></div>
</body>
</html>
