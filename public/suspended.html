<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title id="page-title">Tab Suspended</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: auto; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      padding: 20px 0;
    }
    #preview {
      max-width: 90vw;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    #preview:hover { opacity: 1; }
    .info {
      margin-top: 20px;
      text-align: center;
      max-width: 80vw;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80vw;
    }
    .url {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80vw;
    }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #e94560;
      opacity: 0.8;
    }
    .no-preview {
      width: 400px;
      height: 250px;
      background: #16213e;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
  </style>
</head>
<body>
  <div class="no-preview" id="no-preview">💤</div>
  <img id="preview" style="display:none;" />
  <div class="info">
    <div class="title" id="tab-title"></div>
    <div class="url" id="tab-url"></div>
    <div class="hint">Click anywhere to wake up</div>
  </div>

  <script src="suspended.js"></script>
</body>
</html>
